name: E2E Nightly (full Playwright)

# Full Playwright suite — dev-server + preview-mode + serial-heavy. Runs:
#   * nightly at 04:00 UTC,
#   * on manual `workflow_dispatch`,
#   * on pushes to `main` (so a regression that smoke missed still shows up
#     within the day).
#
# Failures here do NOT block PRs (that's the smoke gate above). Their job
# is triage signal — the artifacts are uploaded for each failed test so an
# agent can read `agf-state.json` + the trace without re-running locally.

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  full-dev:
    name: Full Playwright — dev server
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run full dev-server suite
        run: npm run test:e2e:full-dev
      - name: Upload Playwright report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev
          path: playwright-report
          retention-days: 3
      - name: Upload test-results on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-dev
          path: test-results
          retention-days: 3

  preview:
    name: Full Playwright — vite preview
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run preview-mode suite
        run: npm run test:e2e:preview
      - name: Upload Playwright report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-preview
          path: playwright-report
          retention-days: 3
      - name: Upload test-results on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-preview
          path: test-results
          retention-days: 3
