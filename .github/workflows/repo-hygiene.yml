name: Repo hygiene

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  cyrillic-check:
    name: No Cyrillic in tracked files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tracked files for Cyrillic characters
        shell: bash
        run: |
          set -u
          # ripgrep respects .gitignore by default, so Notes/, References/,
          # node_modules/, dist/ and other ignored paths are skipped
          # automatically. Binary files are also skipped by default.
          matches="$(rg -l '\p{Cyrillic}' || true)"
          if [ -n "$matches" ]; then
            echo "::error::Cyrillic characters found in tracked repository files."
            echo "$matches" | while read -r file; do
              echo "::error file=$file::contains Cyrillic characters"
            done
            echo ""
            echo "Repository content must stay English (see CLAUDE.md and AGENTS.md)."
            echo "Move personal notes to the gitignored Notes/ folder, or translate the file."
            exit 1
          fi
          echo "No Cyrillic characters found in tracked files."

  typecheck-and-unit:
    name: Typecheck + unit tests + engine:check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: engine:check examples
        run: npm run engine:check:examples
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm run test -- --run
