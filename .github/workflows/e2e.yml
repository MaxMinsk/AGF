name: E2E (Playwright)

# Browser smoke + multiplayer + HMR scenarios live here. They are heavier and
# more retry-prone than the unit suite, so they run on a dedicated workflow
# that is required on PRs to `main` but excluded from the main hygiene matrix.
# A separate workflow means GPU/timing flakes don't block unrelated PRs while
# we iterate on stability (see Sprint 44 OSS-e2e-stability story).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright smoke + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
