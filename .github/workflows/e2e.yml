name: E2E (Playwright smoke)

# PR-required browser gate. Runs ONLY the smoke project — a small, reliable
# subset that must be green on every change. The full Playwright suite
# (including HMR-stress + multiclient + dev-bridge gameplay) lives in
# `e2e-nightly.yml` and runs on a cron + workflow_dispatch.
#
# Sprint 46 CI-e2e-required-smoke / CI-e2e-full-nightly. See
# docs/research/e2e-ci-investigation.md for the root-cause analysis.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel any in-flight smoke run when a new commit lands on the same ref
# (PR or branch). Saves Actions minutes when an agent pushes a fix-up
# while the previous run is still going.
concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      # Playwright browser binaries are ~300 MB. Cache them between runs
      # keyed by the resolved playwright version in package-lock.json so a
      # version bump invalidates the cache automatically.
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          v=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run smoke project
        run: npm run test:e2e:smoke
      # `continue-on-error: true` on the artifact uploads — when the
      # account-wide free-tier artifact quota (500 MB) is full the upload
      # action fails the entire workflow even though the tests already
      # passed/failed cleanly. We'd rather lose the artifact than the gate.
      - name: Upload Playwright report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 3
      - name: Upload test-results on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 3
