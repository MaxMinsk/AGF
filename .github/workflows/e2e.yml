name: E2E (Playwright smoke)

# PR-required browser gate. Runs ONLY the smoke project — a small, reliable
# subset that must be green on every change. The full Playwright suite
# (including HMR-stress + multiclient + dev-bridge gameplay) lives in
# `e2e-nightly.yml` and runs on a cron + workflow_dispatch.
#
# Sprint 46 CI-e2e-required-smoke / CI-e2e-full-nightly. See
# docs/research/e2e-ci-investigation.md for the root-cause analysis.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke project
        run: npm run test:e2e:smoke
      # `continue-on-error: true` on the artifact uploads — when the
      # account-wide free-tier artifact quota (500 MB) is full the upload
      # action fails the entire workflow even though the tests already
      # passed/failed cleanly. We'd rather lose the artifact than the gate.
      - name: Upload Playwright report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 3
      - name: Upload test-results on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 3
